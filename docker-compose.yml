services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-love_app}
    volumes:
      # Named volume keeps data across container restarts and re-creates.
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   # Expose on host only for local development (e.g. psql, DBeaver).
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-love_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ──────────────────────────────────────────────────────────────
  # No ports exposed to the host; nginx is the only entry point from outside.
  api:
    build:
      context: ./be
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:        8080
      GIN_MODE:    ${GIN_MODE:-release}
      DB_HOST:     db
      DB_PORT:     5432
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME:     ${DB_NAME:-love_app}
      DB_SSLMODE:  disable

  # ── pgAdmin (PostgreSQL UI) ───────────────────────────────────────────────────
  # Bound to 127.0.0.1 so it is reachable only from the host machine.
  # Access at http://localhost:8081
  # Login with PGADMIN_DEFAULT_EMAIL / PGADMIN_DEFAULT_PASSWORD below.
  # Add a server: host=db port=5432, credentials as per DB_USER/DB_PASSWORD.
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"   # single-user desktop mode
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:8081:80"

  # ── Nginx (SSL termination + reverse proxy) ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"    # HTTP → redirect to HTTPS
      - "443:443"  # HTTPS → proxy to api:8080
    volumes:
      # nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificate and private key (provide your own in nginx/certs/)
      - ./nginx/certs:/etc/nginx/certs:ro

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local
