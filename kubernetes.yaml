---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mimmis

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimmis-config
  namespace: mimmis
data:
  PORT: "6000"
  GIN_MODE: "release"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "mimmis"
  DB_SSLMODE: "disable"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: mimmis-secret
  namespace: mimmis
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "changeme_in_production"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme_in_production"
  POSTGRES_DB: "mimmis"

---
# PersistentVolumeClaim for PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: mimmis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard  # Uncomment and set your storage class

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mimmis
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_DB
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - mimmis
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - mimmis
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: mimmis
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres

---
# Backend API Deployment (3 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimmis-api
  namespace: mimmis
  labels:
    app: mimmis-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mimmis-api
  template:
    metadata:
      labels:
        app: mimmis-api
    spec:
      initContainers:
      # Wait for PostgreSQL to be ready before starting API
      - name: wait-for-postgres
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          until nc -z postgres-service 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: api
        image: mimmis-api:latest  # Replace with your actual image registry/tag
        ports:
        - containerPort: 6000
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: PORT
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: GIN_MODE
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_NAME
        - name: DB_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_SSLMODE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      # Anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mimmis-api
              topologyKey: kubernetes.io/hostname

---
# Backend API Service
apiVersion: v1
kind: Service
metadata:
  name: mimmis-api-service
  namespace: mimmis
  labels:
    app: mimmis-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 6000
    protocol: TCP
    name: http
  selector:
    app: mimmis-api

---
# Ingress with API Gateway and WAF (ModSecurity)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimmis-ingress
  namespace: mimmis
  annotations:
    # API Gateway and routing
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # WAF - ModSecurity with OWASP Core Rule Set
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    
    # Additional WAF configuration
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On
      SecAuditEngine RelevantOnly
      SecAuditLogParts ABIJDEFHZ
      SecAuditLog /dev/stdout
      # Block SQL injection attempts
      SecRule ARGS "@detectSQLi" "id:1000,phase:2,deny,status:403,msg:'SQL Injection Detected'"
      # Block XSS attempts
      SecRule ARGS "@detectXSS" "id:1001,phase:2,deny,status:403,msg:'XSS Attack Detected'"
      # Rate limiting per IP (100 requests per minute)
      SecAction "id:1002,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR},setvar:ip.requests=+1,expirevar:ip.requests=60"
      SecRule IP:REQUESTS "@gt 100" "id:1003,phase:1,deny,status:429,msg:'Rate limit exceeded'"
    
    # Rate limiting (alternative/additional layer)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    
    # Body size limit
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    
    # SSL/TLS configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.yourdomain.com  # Replace with your actual domain
    secretName: mimmis-tls-secret
  rules:
  - host: api.yourdomain.com  # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mimmis-api-service
            port:
              number: 80

---
# HorizontalPodAutoscaler for API (optional but recommended)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mimmis-api-hpa
  namespace: mimmis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mimmis-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget to ensure availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mimmis-api-pdb
  namespace: mimmis
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mimmis-api

---
# NetworkPolicy for security (optional but recommended)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mimmis-network-policy
  namespace: mimmis
spec:
  podSelector:
    matchLabels:
      app: mimmis-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 6000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow connection to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow external HTTPS (if API needs to call external services)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# NetworkPolicy for PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: mimmis
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  # Only allow traffic from API pods
  - from:
    - podSelector:
        matchLabels:
          app: mimmis-api
    ports:
    - protocol: TCP
      port: 5432
