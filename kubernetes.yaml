---
# Backend API Deployment (3 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimmis-api
  namespace: mimmis
  labels:
    app: mimmis-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mimmis-api
  template:
    metadata:
      labels:
        app: mimmis-api
    spec:
      initContainers:
      # Wait for PostgreSQL to be ready before starting API
      - name: wait-for-postgres
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          until nc -z postgres-service 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: api
        image: ha-pub.mxnhd3k7jxkm1j3.itbg.svcff.mycloudplatform.cloud/mimmis/mimmis-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6000
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: PORT
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: GIN_MODE
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_NAME
        - name: DB_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: mimmis-config
              key: DB_SSLMODE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      # Anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mimmis-api
              topologyKey: kubernetes.io/hostname

# ---
# ConfigMap for ModSecurity WAF rules
# Applied globally by the ingress-nginx controller via the modsecurity-snippet key
# in the ingress-nginx-controller ConfigMap (see below).
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: mimmis-modsecurity
#   namespace: mimmis
# data:
#   modsecurity.conf: |
#     SecRuleEngine On
#     SecRequestBodyAccess On
#     SecAuditEngine RelevantOnly
#     SecAuditLogParts ABIJDEFHZ
#     SecAuditLog /dev/stdout
#     # Block SQL injection attempts
#     SecRule ARGS "@detectSQLi" "id:1000,phase:2,deny,status:403,msg:'SQL Injection Detected'"
#     # Block XSS attempts
#     SecRule ARGS "@detectXSS" "id:1001,phase:2,deny,status:403,msg:'XSS Attack Detected'"
#     # Rate limiting per IP (100 requests per minute)
#     SecAction "id:1002,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR},setvar:ip.requests=+1,expirevar:ip.requests=60"
#     SecRule IP:REQUESTS "@gt 100" "id:1003,phase:1,deny,status:429,msg:'Rate limit exceeded'"

---
# ConfigMap for security response headers
# Applied globally by the ingress-nginx controller via add-headers.
# To activate, patch the ingress-nginx controller ConfigMap:
#   kubectl patch configmap ingress-nginx-controller -n ingress-nginx \
#     --type merge -p '{"data":{"add-headers":"mimmis/mimmis-security-headers"}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimmis-security-headers
  namespace: mimmis
data:
  Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options: "DENY"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Content-Security-Policy: "default-src 'self'"
  X-Forwarded-Proto: "https"

---
# Patch for the ingress-nginx controller ConfigMap
# Wires the security-headers ConfigMap so nginx injects them on every response.
# Also activates the ModSecurity rules from mimmis-modsecurity ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  add-headers: "mimmis/mimmis-security-headers"
  modsecurity-snippet: |
    SecRuleEngine On
    SecRequestBodyAccess On
    SecAuditEngine RelevantOnly
    SecAuditLogParts ABIJDEFHZ
    SecAuditLog /dev/stdout
    # Block SQL injection attempts
    SecRule ARGS "@detectSQLi" "id:1000,phase:2,deny,status:403,msg:'SQL Injection Detected'"
    # Block XSS attempts
    SecRule ARGS "@detectXSS" "id:1001,phase:2,deny,status:403,msg:'XSS Attack Detected'"
    # Rate limiting per IP (100 requests per minute)
    SecAction "id:1002,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR},setvar:ip.requests=+1,expirevar:ip.requests=60"
    SecRule IP:REQUESTS "@gt 100" "id:1003,phase:1,deny,status:429,msg:'Rate limit exceeded'"

---
# Backend API Service
apiVersion: v1
kind: Service
metadata:
  name: mimmis-api-service
  namespace: mimmis
  labels:
    app: mimmis-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 6000
    protocol: TCP
    name: http
  selector:
    app: mimmis-api

---
# Ingress with API Gateway and WAF (ModSecurity)
# SSL TERMINATION: HTTPS -> Ingress (SSL terminates here) -> HTTP -> Service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimmis-ingress
  namespace: mimmis
  annotations:
    # === SSL/TLS TERMINATION CONFIGURATION ===
    # Force all HTTP traffic to redirect to HTTPS (301 permanent redirect)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Backend communication uses HTTP (SSL terminates at ingress)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    
    # SSL/TLS certificate configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
    
    # === API GATEWAY AND ROUTING ===
    nginx.ingress.kubernetes.io/rewrite-target: /
    
    # === WAF - ModSecurity with OWASP Core Rule Set ===
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    
    # Additional WAF configuration
    # ModSecurity rules are managed via the mimmis-modsecurity ConfigMap,
    # injected globally through modsecurity-snippet in ingress-nginx-controller ConfigMap.
    
    # === RATE LIMITING ===
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    
    # === REQUEST LIMITS ===
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # === TIMEOUTS ===
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # === SECURITY HEADERS ===
    # Security headers are injected globally by the ingress-nginx controller
    # via the mimmis-security-headers ConfigMap (add-headers in ingress-nginx-controller ConfigMap).
spec:
  ingressClassName: nginx
  
  # === SSL/TLS TERMINATION ===
  # Ingress terminates SSL here. Traffic flow:
  # 1. Client -> HTTPS (443) -> Ingress (SSL terminates)
  # 2. Ingress -> HTTP (80) -> mimmis-api-service
  # 3. HTTP requests are automatically redirected to HTTPS (see annotations)
  # tls:
  # - hosts:
  #   - "api.mimmis.it"  # Replace with your actual domain
  #   secretName: mimmis-tls-secret  # TLS certificate stored here
  
  # === ROUTING RULES ===
  rules:
  - http:
      paths:
      # pgAdmin UI - accessible at https://api.yourdomain.com/pgadmin/
      - path: /pgadmin
        pathType: Prefix
        backend:
          service:
            name: pgadmin-service
            port:
              number: 80
      # Main API - default path
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mimmis-api-service
            port:
              number: 80  # Backend service uses HTTP (SSL already terminated)

---

# PodDisruptionBudget to ensure availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mimmis-api-pdb
  namespace: mimmis
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mimmis-api

---
# NetworkPolicy for security (optional but recommended)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mimmis-network-policy
  namespace: mimmis
spec:
  podSelector:
    matchLabels:
      app: mimmis-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 6000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow connection to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow external HTTPS (if API needs to call external services)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# NetworkPolicy for PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: mimmis
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic from API pods
  - from:
    - podSelector:
        matchLabels:
          app: mimmis-api
    ports:
    - protocol: TCP
      port: 5432
  # Allow traffic from pgAdmin
  - from:
    - podSelector:
        matchLabels:
          app: pgadmin
    ports:
    - protocol: TCP
      port: 5432

---
# NetworkPolicy for pgAdmin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgadmin-network-policy
  namespace: mimmis
spec:
  podSelector:
    matchLabels:
      app: pgadmin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow connection to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
