---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mimmis

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimmis-config
  namespace: mimmis
data:
  PORT: "6000"
  GIN_MODE: "release"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "mimmis"
  DB_SSLMODE: "disable"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: mimmis-secret
  namespace: mimmis
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "mimmis"
  # pgAdmin credentials
  PGADMIN_DEFAULT_EMAIL: "admin@mimmis.local"
  PGADMIN_DEFAULT_PASSWORD: "SuperSecret"

---
# ConfigMap for pgAdmin server configuration
# Pre-configures PostgreSQL connection
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: mimmis
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Mimmis PostgreSQL",
          "Group": "Production",
          "Host": "postgres-service",
          "Port": 5432,
          "MaintenanceDB": "mimmis",
          "Username": "postgres",
          "SSLMode": "disable",
          "PassFile": "/pgpass"
        }
      }
    }
  pgpass: |
    postgres-service:5432:mimmis:postgres:postgres

---
# PersistentVolumeClaim for PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: mimmis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard  # Uncomment and set your storage class

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mimmis
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent        
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: mimmis-secret
              key: POSTGRES_DB
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - mimmis
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - mimmis
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: mimmis
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres

