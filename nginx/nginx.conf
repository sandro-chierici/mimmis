# Global worker settings
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Hide nginx version from response headers (minor security hardening).
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    # All plain-HTTP traffic is permanently redirected to HTTPS.
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS + reverse proxy to the API ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────────
        # Mount your cert/key into the container via the nginx/certs/ directory.
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Allow only modern TLS versions (drop TLS 1.0 / 1.1).
        ssl_protocols TLSv1.2 TLSv1.3;

        # Prefer strong cipher suites and let the server choose the order.
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Keep TLS sessions cached for 10 min to reduce handshake overhead.
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header X-Frame-Options           SAMEORIGIN                            always;

        # ── Proxy to the API container ────────────────────────────────────────
        # "api" resolves via Docker's internal DNS to the api service.
        location / {
            proxy_pass         http://api:6000;

            # Forward real client IP and protocol so the API can log them.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Reasonable timeouts for a REST API.
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }
    }
}
